server:
  port: 8080

spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/devopsdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework: INFO
    com.devops.backend: DEBUG